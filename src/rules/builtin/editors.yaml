domain: editors
rules:
  # Opening a file in an interactive editor is best handed off — we can't
  # run them meaningfully and capture output.
  - id: code-open
    match:
      type: regex
      patterns:
        - "^code\\s+\\.$"
        - "^code\\s+([\\w./\\-]+)$"
        - "^code\\s+-r\\s+([\\w./\\-]+)$"
    action: { type: shell, command: "code {{input}}" }
    safety: write-confined

  - id: interactive-editor-open
    match:
      type: regex
      patterns:
        - "^(vim|nvim|nano|subl|idea|webstorm|code-insiders|cursor|zed|helix|hx|micro|emacs|gedit|atom|mate)\\s+([\\w./\\-]+)$"
    action:
      type: passthrough
      reason: "interactive editor — let the AI tool open it or the user runs it themselves"
    safety: read-only

  # ── Version / help queries for every editor users commonly type ─────
  - id: editor-info
    match:
      type: exact
      patterns:
        - "code --version"
        - "code -v"
        - "code --help"
        - "code-insiders --version"
        - "code-insiders -v"
        - "cursor --version"
        - "cursor -v"
        - "vim --version"
        - "vim -v"
        - "nvim --version"
        - "nvim -v"
        - "nvim --help"
        - "nano --version"
        - "nano -V"
        - "emacs --version"
        - "emacs --help"
        - "subl --version"
        - "subl -v"
        - "idea --version"
        - "webstorm --version"
        - "pycharm --version"
        - "goland --version"
        - "rubymine --version"
        - "rider --version"
        - "clion --version"
        - "helix --version"
        - "hx --version"
        - "micro --version"
        - "micro -version"
        - "zed --version"
        - "lvim --version"
        - "spacevim --version"
        - "kakoune --version"
        - "kak --version"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  # Extensions / plugins — read queries are cheap to run.
  - id: vscode-ext-list
    match:
      type: exact
      patterns:
        - "code --list-extensions"
        - "code --list-extensions --show-versions"
        - "code-insiders --list-extensions"
        - "cursor --list-extensions"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  # Extension install/uninstall — network-touching (writes to marketplace).
  - id: vscode-ext-install
    match:
      type: regex
      patterns:
        - "^code\\s+--install-extension\\s+([\\w.\\-@/]+)$"
        - "^code-insiders\\s+--install-extension\\s+([\\w.\\-@/]+)$"
        - "^cursor\\s+--install-extension\\s+([\\w.\\-@/]+)$"
    action: { type: shell, command: "{{input}}" }
    safety: write-network

  - id: vscode-ext-uninstall
    match:
      type: regex
      patterns:
        - "^code\\s+--uninstall-extension\\s+([\\w.\\-@/]+)$"
        - "^code-insiders\\s+--uninstall-extension\\s+([\\w.\\-@/]+)$"
        - "^cursor\\s+--uninstall-extension\\s+([\\w.\\-@/]+)$"
    action: { type: shell, command: "{{input}}" }
    safety: write-confined

  # Diff and goto — non-interactive invocations open a new window/file but
  # return immediately, so they're safe to shell out.
  - id: vscode-diff
    match:
      type: regex
      patterns:
        - "^code\\s+--diff\\s+(\\S+)\\s+(\\S+)$"
        - "^code-insiders\\s+--diff\\s+(\\S+)\\s+(\\S+)$"
        - "^cursor\\s+--diff\\s+(\\S+)\\s+(\\S+)$"
    action: { type: shell, command: "{{input}}" }
    safety: read-only

  - id: vscode-goto
    match:
      type: regex
      patterns:
        - "^code\\s+--goto\\s+(\\S+)$"
        - "^code\\s+-g\\s+(\\S+)$"
    action: { type: shell, command: "{{input}}" }
    safety: read-only

  # Editor config + runtime queries — e.g. `nvim --startuptime`, Helix health.
  - id: editor-runtime-info
    match:
      type: exact
      patterns:
        - "nvim --startuptime /tmp/nvim-startup.log"
        - "nvim --headless +qa"
        - "hx --health"
        - "hx --health all"
        - "hx --tutor"
        - "code --status"
        - "code --locate-shell-integration-path bash"
        - "code --locate-shell-integration-path zsh"
        - "code --locate-shell-integration-path fish"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only
