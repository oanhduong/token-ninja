domain: secrets-infra
rules:
  # ── Vault ───────────────────────────────────────────────────────────
  - id: vault-info
    match:
      type: exact
      patterns:
        - "vault --version"
        - "vault version"
        - "vault -v"
        - "vault status"
        - "vault token lookup"
        - "vault auth list"
        - "vault secrets list"
        - "vault plugin list"
        - "vault policy list"
        - "vault namespace list"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  - id: vault-read-passthrough
    match:
      type: prefix
      patterns:
        - "vault kv list"
        - "vault kv get"
        - "vault read"
        - "vault list"
        - "vault policy read"
        - "vault auth list"
        - "vault secrets list"
    action: { type: shell, command: "vault", args_passthrough: true }
    safety: read-only

  # ── Nomad ───────────────────────────────────────────────────────────
  - id: nomad-info
    match:
      type: exact
      patterns:
        - "nomad --version"
        - "nomad -v"
        - "nomad version"
        - "nomad status"
        - "nomad node status"
        - "nomad server members"
        - "nomad agent-info"
        - "nomad job status"
        - "nomad namespace list"
        - "nomad deployment status"
        - "nomad eval list"
        - "nomad acl policy list"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  - id: nomad-read-passthrough
    match:
      type: prefix
      patterns:
        - "nomad job status"
        - "nomad node status"
        - "nomad deployment status"
        - "nomad eval status"
        - "nomad job inspect"
        - "nomad job plan"
        - "nomad alloc status"
        - "nomad alloc logs"
        - "nomad namespace list"
    action: { type: shell, command: "nomad", args_passthrough: true }
    safety: read-only

  # ── Packer plugins (core packer lives in iac.yaml) ──────────────────
  - id: packer-plugins
    match:
      type: exact
      patterns:
        - "packer -v"
        - "packer plugins installed"
        - "packer plugins required"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  # ── age / sops / 1password / bitwarden — identity & version only ────
  # We never read actual secrets; only surface capability checks.
  - id: sops-info
    match:
      type: exact
      patterns:
        - "sops --version"
        - "sops -v"
        - "sops --help"
        - "age --version"
        - "age-keygen --version"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  - id: op-bw-info
    match:
      type: exact
      patterns:
        - "op --version"
        - "op -v"
        - "op account list"
        - "op vault list"
        - "bw --version"
        - "bw status"
        - "gopass version"
        - "pass --version"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only
