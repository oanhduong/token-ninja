domain: process-mgmt
rules:
  - id: ps
    match:
      type: exact
      patterns: ["ps", "ps aux", "ps -ef", "ps -f", "ps -fu", "ps auxf", "ps -ejH"]
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  - id: ps-passthrough
    match:
      type: regex
      patterns: ["^ps(?:\\s+.+)?$"]
    action: { type: shell, command: "{{input}}" }
    safety: read-only

  - id: top-one-shot
    match:
      type: exact
      patterns: ["top -b -n 1", "top -bn1"]
    action: { type: shell, command: "top -b -n 1" }
    safety: read-only

  - id: top-interactive
    match:
      type: exact
      patterns: ["top", "htop"]
    action:
      type: passthrough
      reason: "top/htop are interactive TUIs"
    safety: read-only

  - id: pgrep
    match:
      type: prefix
      patterns: ["pgrep -f", "pgrep -l", "pgrep -a", "pgrep"]
    action: { type: shell, command: "pgrep", args_passthrough: true }
    safety: read-only

  - id: pidof
    match:
      type: prefix
      patterns: ["pidof"]
    action: { type: shell, command: "pidof", args_passthrough: true }
    safety: read-only

  - id: pstree
    match:
      type: prefix
      patterns: ["pstree"]
    action: { type: shell, command: "pstree", args_passthrough: true }
    safety: read-only

  - id: kill-list
    match:
      type: exact
      patterns: ["kill -l", "kill -L"]
    action: { type: shell, command: "kill -l" }
    safety: read-only

  - id: nice-cmd
    match:
      type: prefix
      patterns: ["nice -n"]
    action: { type: shell, command: "nice", args_passthrough: true }
    safety: read-only

  - id: renice
    match:
      type: prefix
      patterns: ["renice"]
    action: { type: shell, command: "renice", args_passthrough: true }
    safety: write-confined

  # Per-process introspection — pwdx, lsof -p, fuser.
  - id: pwdx
    match:
      type: prefix
      patterns: ["pwdx"]
    action: { type: shell, command: "pwdx", args_passthrough: true }
    safety: read-only

  - id: lsof-process
    match:
      type: regex
      patterns:
        - "^lsof\\s+-p\\s+(\\d+)$"
        - "^lsof\\s+-c\\s+(\\S+)$"
    action: { type: shell, command: "{{input}}" }
    safety: read-only

  - id: fuser
    match:
      type: prefix
      patterns: ["fuser"]
    action: { type: shell, command: "fuser", args_passthrough: true }
    safety: read-only

  # /proc-style status queries.
  - id: proc-status
    match:
      type: regex
      patterns:
        - "^cat\\s+/proc/(\\d+)/(status|cmdline|environ|limits|cgroup|stat)$"
    action: { type: shell, command: "{{input}}" }
    safety: read-only

  # cgroups + systemd-cgls are read-only introspection.
  - id: systemd-cgls
    match:
      type: exact
      patterns:
        - "systemd-cgls"
        - "systemd-cgls --no-pager"
        - "systemd-cgtop"
        - "systemd-cgtop -b -n 1"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  # Per-process CPU/IO sampler — pidstat isn't claimed by system-info.
  - id: pidstat
    match:
      type: prefix
      patterns: ["pidstat"]
    action: { type: shell, command: "pidstat", args_passthrough: true }
    safety: read-only
