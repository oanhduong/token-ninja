domain: build-tools
rules:
  - id: make
    match:
      type: exact
      patterns:
        - "make"
        - "make clean"
        - "make all"
        - "make test"
        - "make build"
        - "make check"
        - "make dist"
        - "make -j"
        - "make -j4"
        - "make -j8"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: write-confined

  - id: make-passthrough
    match:
      type: prefix
      patterns: ["make"]
    action: { type: shell, command: "make", args_passthrough: true }
    safety: write-confined

  - id: cmake
    match:
      type: exact
      patterns: ["cmake .", "cmake --build .", "cmake --build build", "cmake -B build", "cmake --version", "cmake -S . -B build"]
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: write-confined

  - id: cmake-passthrough
    match:
      type: prefix
      patterns: ["cmake --build", "cmake --install", "cmake -B", "cmake -S", "cmake"]
    action: { type: shell, command: "cmake", args_passthrough: true }
    safety: write-confined

  - id: ninja-build
    match:
      type: exact
      patterns: ["ninja", "ninja -t clean"]
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: write-confined

  - id: ninja-passthrough
    match:
      type: prefix
      patterns: ["ninja -t", "ninja -j"]
    action: { type: shell, command: "ninja", args_passthrough: true }
    safety: write-confined

  - id: bazel
    match:
      type: exact
      patterns: ["bazel build //...", "bazel test //...", "bazel run", "bazel clean", "bazel info", "bazel version"]
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: write-network

  - id: bazel-passthrough
    match:
      type: prefix
      patterns: ["bazel build", "bazel test", "bazel run", "bazel clean", "bazel query", "bazel info"]
    action: { type: shell, command: "bazel", args_passthrough: true }
    safety: write-network

  - id: sbt
    match:
      type: exact
      patterns: ["sbt compile", "sbt test", "sbt run", "sbt clean", "sbt package", "sbt about"]
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: write-network

  - id: sbt-passthrough
    match:
      type: prefix
      patterns: ["sbt"]
    action: { type: shell, command: "sbt", args_passthrough: true }
    safety: write-network

  - id: lein
    match:
      type: exact
      patterns: ["lein deps", "lein test", "lein run", "lein compile", "lein clean", "lein version"]
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: write-network

  - id: lein-passthrough
    match:
      type: prefix
      patterns: ["lein"]
    action: { type: shell, command: "lein", args_passthrough: true }
    safety: write-network

  # ── just ────────────────────────────────────────────────────────────
  - id: just-info
    match:
      type: exact
      patterns:
        - "just"
        - "just --version"
        - "just --list"
        - "just -l"
        - "just --summary"
        - "just --show"
        - "just --dump"
        - "just --fmt --check"
        - "just --evaluate"
        - "just --choose"
        - "just --variables"
        - "just --list-submodules"
        - "just --help"
        - "just -h"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  # ── mage / buck2 info ───────────────────────────────────────────────
  - id: mage-buck2-info
    match:
      type: exact
      patterns:
        - "mage --version"
        - "mage -version"
        - "mage -l"
        - "mage -h"
        - "mage -help"
        - "buck2 --version"
        - "buck2 help"
        - "bazelisk --version"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  - id: just-passthrough
    match:
      type: prefix
      patterns: ["just --list", "just -l", "just --show", "just --summary", "just --dump", "just --evaluate", "just test", "just build", "just run", "just lint", "just fmt"]
    action: { type: shell, command: "just", args_passthrough: true }
    safety: write-confined

  # ── task (go-task) ──────────────────────────────────────────────────
  - id: task-info
    match:
      type: exact
      patterns:
        - "task --version"
        - "task --list"
        - "task -l"
        - "task --list-all"
        - "task -a"
        - "task --summary"
        - "task"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  - id: task-passthrough
    match:
      type: prefix
      patterns: ["task --list", "task -l", "task --list-all", "task -a", "task --summary", "task --status", "task "]
    action: { type: shell, command: "task", args_passthrough: true }
    safety: write-confined

  # ── Meson ───────────────────────────────────────────────────────────
  - id: meson-info
    match:
      type: exact
      patterns:
        - "meson --version"
        - "meson compile"
        - "meson test"
        - "meson introspect"
        - "meson configure"
        - "meson dist"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: write-confined

  - id: meson-passthrough
    match:
      type: prefix
      patterns: ["meson setup", "meson compile", "meson test", "meson introspect", "meson configure", "meson install"]
    action: { type: shell, command: "meson", args_passthrough: true }
    safety: write-confined

