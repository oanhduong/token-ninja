domain: shell-advanced
rules:
  - id: xargs
    match:
      type: prefix
      patterns: ["xargs"]
    action: { type: shell, command: "xargs", args_passthrough: true }
    safety: read-only

  - id: tee
    match:
      type: prefix
      patterns: ["tee -a", "tee"]
    action: { type: shell, command: "tee", args_passthrough: true }
    safety: write-confined

  - id: wait-jobs
    match:
      type: exact
      patterns: ["jobs", "jobs -l", "jobs -p", "jobs -r", "jobs -s"]
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  - id: time-cmd
    match:
      type: prefix
      patterns: ["time"]
    action: { type: shell, command: "time", args_passthrough: true }
    safety: read-only

  - id: timeout
    match:
      type: regex
      patterns: ["^timeout\\s+(\\d+[smh]?)\\s+(.+)$"]
    action: { type: shell, command: "timeout {{arg1}} {{arg2}}" }
    safety: read-only

  - id: watch
    match:
      type: prefix
      patterns: ["watch -n"]
    action:
      type: passthrough
      reason: "watch is interactive; don't trap it locally"
    safety: read-only

  - id: tput
    match:
      type: prefix
      patterns: ["tput"]
    action: { type: shell, command: "tput", args_passthrough: true }
    safety: read-only

  - id: getopts-examples
    match:
      type: regex
      patterns: ["^set\\s+-[exuo]+$"]
    action:
      type: passthrough
      reason: "`set -e` etc only affect the parent shell"
    safety: read-only

  # ── tmux read-only ──────────────────────────────────────────────────
  - id: tmux-info
    match:
      type: exact
      patterns:
        - "tmux -V"
        - "tmux --version"
        - "tmux ls"
        - "tmux list-sessions"
        - "tmux list-panes"
        - "tmux list-windows"
        - "tmux list-clients"
        - "tmux list-commands"
        - "tmux list-keys"
        - "tmux show-options"
        - "tmux show-options -g"
        - "tmux show-environment"
        - "tmux show-messages"
        - "tmux info"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  # ── screen read-only ────────────────────────────────────────────────
  - id: screen-info
    match:
      type: exact
      patterns:
        - "screen -v"
        - "screen --version"
        - "screen -ls"
        - "screen -list"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  # ── zellij / wezterm info ───────────────────────────────────────────
  - id: multiplexer-info
    match:
      type: exact
      patterns:
        - "zellij --version"
        - "zellij -V"
        - "zellij list-sessions"
        - "zellij ls"
        - "wezterm --version"
        - "wezterm ls-fonts"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  # ── history / alias / type / command ────────────────────────────────
  - id: shell-introspect
    match:
      type: exact
      patterns:
        - "history"
        - "history 10"
        - "history 20"
        - "history 50"
        - "alias"
        - "unalias"
        - "type ls"
        - "type git"
        - "type node"
        - "command -v ls"
        - "command -v node"
        - "command -v git"
        - "command -V ls"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  - id: type-command-passthrough
    match:
      type: regex
      patterns:
        - "^(type|command)\\s+(-[a-zA-Z]+\\s+)?[\\w./\\-]+$"
    action: { type: shell, command: "{{input}}" }
    safety: read-only

  # ── shopt / ulimit / umask / printenv ───────────────────────────────
  - id: shell-state
    match:
      type: exact
      patterns:
        - "shopt"
        - "shopt -s"
        - "shopt -p"
        - "ulimit"
        - "ulimit -a"
        - "ulimit -n"
        - "ulimit -Hn"
        - "ulimit -Sn"
        - "umask"
        - "umask -S"
        - "umask -p"
        - "printenv"
        - "set"
        - "locale"
        - "locale -a"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  - id: printenv-get
    match:
      type: regex
      patterns:
        - "^printenv\\s+[A-Z_][A-Z0-9_]*$"
    action: { type: shell, command: "{{input}}" }
    safety: read-only
