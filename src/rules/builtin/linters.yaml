domain: linters
rules:
  - id: eslint
    match:
      type: exact
      patterns: ["eslint .", "eslint src", "eslint --fix .", "eslint --fix src", "eslint --version"]
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: write-confined

  - id: eslint-passthrough
    match:
      type: prefix
      patterns: ["eslint --fix", "eslint"]
    action: { type: shell, command: "eslint", args_passthrough: true }
    safety: write-confined

  - id: prettier
    match:
      type: exact
      patterns: ["prettier --check .", "prettier --write .", "prettier --check src", "prettier --write src", "prettier --version"]
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: write-confined

  - id: prettier-passthrough
    match:
      type: prefix
      patterns: ["prettier --check", "prettier --write", "prettier -c", "prettier -w", "prettier"]
    action: { type: shell, command: "prettier", args_passthrough: true }
    safety: write-confined

  - id: stylelint
    match:
      type: prefix
      patterns: ["stylelint"]
    action: { type: shell, command: "stylelint", args_passthrough: true }
    safety: write-confined

  - id: tslint
    match:
      type: prefix
      patterns: ["tslint"]
    action: { type: shell, command: "tslint", args_passthrough: true }
    safety: read-only

  - id: rubocop
    match:
      type: exact
      patterns: ["rubocop", "rubocop -A", "rubocop -a", "rubocop --version"]
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: write-confined

  - id: rubocop-passthrough
    match:
      type: prefix
      patterns: ["rubocop"]
    action: { type: shell, command: "rubocop", args_passthrough: true }
    safety: write-confined

  - id: shellcheck
    match:
      type: prefix
      patterns: ["shellcheck"]
    action: { type: shell, command: "shellcheck", args_passthrough: true }
    safety: read-only

  - id: hadolint
    match:
      type: prefix
      patterns: ["hadolint"]
    action: { type: shell, command: "hadolint", args_passthrough: true }
    safety: read-only

  - id: yamllint
    match:
      type: prefix
      patterns: ["yamllint"]
    action: { type: shell, command: "yamllint", args_passthrough: true }
    safety: read-only

  - id: markdownlint
    match:
      type: prefix
      patterns: ["markdownlint"]
    action: { type: shell, command: "markdownlint", args_passthrough: true }
    safety: write-confined

  # ── Biome ───────────────────────────────────────────────────────────
  - id: biome-info
    match:
      type: exact
      patterns:
        - "biome --version"
        - "biome -V"
        - "biome check"
        - "biome check ."
        - "biome check --write"
        - "biome check --write ."
        - "biome lint"
        - "biome lint ."
        - "biome format"
        - "biome format --write"
        - "biome format --write ."
        - "biome ci"
        - "biome ci ."
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: write-confined

  - id: biome-passthrough
    match:
      type: prefix
      patterns: ["biome check", "biome lint", "biome format", "biome ci", "biome migrate", "biome explain"]
    action: { type: shell, command: "biome", args_passthrough: true }
    safety: write-confined

  # ── oxlint ──────────────────────────────────────────────────────────
  - id: oxlint
    match:
      type: prefix
      patterns: ["oxlint --fix", "oxlint"]
    action: { type: shell, command: "oxlint", args_passthrough: true }
    safety: write-confined

  # ── dprint ──────────────────────────────────────────────────────────
  - id: dprint-info
    match:
      type: exact
      patterns:
        - "dprint --version"
        - "dprint check"
        - "dprint fmt"
        - "dprint fmt --check"
        - "dprint output-file-paths"
        - "dprint output-format-times"
        - "dprint config dump"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: write-confined

  - id: dprint-passthrough
    match:
      type: prefix
      patterns: ["dprint check", "dprint fmt", "dprint output-file-paths", "dprint output-format-times"]
    action: { type: shell, command: "dprint", args_passthrough: true }
    safety: write-confined

  # ── actionlint / jsonlint / gitleaks / pre-commit ───────────────────
  - id: actionlint
    match:
      type: prefix
      patterns: ["actionlint"]
    action: { type: shell, command: "actionlint", args_passthrough: true }
    safety: read-only

  - id: jsonlint
    match:
      type: prefix
      patterns: ["jsonlint"]
    action: { type: shell, command: "jsonlint", args_passthrough: true }
    safety: read-only

  - id: gitleaks
    match:
      type: prefix
      patterns: ["gitleaks detect", "gitleaks protect", "gitleaks version"]
    action: { type: shell, command: "gitleaks", args_passthrough: true }
    safety: read-only

  - id: pre-commit-info
    match:
      type: exact
      patterns:
        - "pre-commit --version"
        - "pre-commit run --all-files"
        - "pre-commit run"
        - "pre-commit install"
        - "pre-commit autoupdate"
        - "pre-commit clean"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: write-confined

  - id: pre-commit-passthrough
    match:
      type: prefix
      patterns: ["pre-commit run", "pre-commit install", "pre-commit autoupdate", "pre-commit try-repo", "pre-commit migrate-config"]
    action: { type: shell, command: "pre-commit", args_passthrough: true }
    safety: write-confined
