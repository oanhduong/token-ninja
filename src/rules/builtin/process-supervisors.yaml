domain: process-supervisors
rules:
  # ── pm2 ─────────────────────────────────────────────────────────────
  - id: pm2-info
    match:
      type: exact
      patterns:
        - "pm2 list"
        - "pm2 ls"
        - "pm2 status"
        - "pm2 jlist"
        - "pm2 monit"
        - "pm2 info"
        - "pm2 show"
        - "pm2 env"
        - "pm2 --version"
        - "pm2 -v"
        - "pm2 prettylist"
        - "pm2 dump"
        - "pm2 describe"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  - id: pm2-logs
    match:
      type: prefix
      patterns: ["pm2 logs", "pm2 flush"]
    action: { type: shell, command: "pm2", args_passthrough: true }
    safety: read-only

  - id: pm2-lifecycle
    match:
      type: prefix
      patterns:
        - "pm2 start"
        - "pm2 stop"
        - "pm2 restart"
        - "pm2 reload"
        - "pm2 delete"
        - "pm2 scale"
        - "pm2 save"
        - "pm2 resurrect"
    action: { type: shell, command: "pm2", args_passthrough: true }
    safety: write-confined

  # ── systemctl --user (rootless) ─────────────────────────────────────
  - id: systemctl-user-info
    match:
      type: exact
      patterns:
        - "systemctl --user list-units"
        - "systemctl --user list-unit-files"
        - "systemctl --user list-timers"
        - "systemctl --user list-sockets"
        - "systemctl --user --failed"
        - "systemctl --user daemon-reload"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  - id: systemctl-user-passthrough
    match:
      type: prefix
      patterns:
        - "systemctl --user status"
        - "systemctl --user is-active"
        - "systemctl --user is-enabled"
        - "systemctl --user cat"
        - "systemctl --user show"
        - "systemctl --user list-units"
        - "systemctl --user list-unit-files"
    action: { type: shell, command: "systemctl --user", args_passthrough: true }
    safety: read-only

  - id: systemctl-status-rootless
    match:
      type: prefix
      patterns:
        - "systemctl status"
        - "systemctl is-active"
        - "systemctl is-enabled"
        - "systemctl is-failed"
        - "systemctl list-units"
        - "systemctl list-unit-files"
        - "systemctl list-timers"
        - "systemctl cat"
        - "systemctl show"
        - "systemctl --failed"
        - "systemctl --version"
    action: { type: shell, command: "systemctl", args_passthrough: true }
    safety: read-only

  - id: journalctl-read
    match:
      type: prefix
      patterns:
        - "journalctl --user"
        - "journalctl -u"
        - "journalctl --since"
        - "journalctl --boot"
        - "journalctl -xe"
        - "journalctl -f"
    action: { type: shell, command: "journalctl", args_passthrough: true }
    safety: read-only

  - id: launchctl-info
    match:
      type: exact
      patterns:
        - "launchctl list"
        - "launchctl print gui"
        - "launchctl print user"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  # ── foreman / overmind ──────────────────────────────────────────────
  - id: foreman-info
    match:
      type: exact
      patterns:
        - "foreman version"
        - "foreman check"
        - "foreman start"
        - "overmind --version"
        - "overmind ps"
        - "overmind status"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  - id: overmind-passthrough
    match:
      type: prefix
      patterns: ["overmind start", "overmind restart", "overmind stop", "overmind connect"]
    action: { type: shell, command: "overmind", args_passthrough: true }
    safety: write-confined

  # ── supervisord ─────────────────────────────────────────────────────
  - id: supervisorctl-info
    match:
      type: exact
      patterns:
        - "supervisorctl status"
        - "supervisorctl pid"
        - "supervisorctl version"
        - "supervisorctl avail"
        - "supervisorctl reread"
        - "supervisorctl maintail"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  - id: supervisorctl-status-one
    match:
      type: regex
      patterns:
        - "^supervisorctl\\s+status\\s+(\\S+)$"
        - "^supervisorctl\\s+tail\\s+(-f\\s+)?(\\S+)$"
        - "^supervisorctl\\s+pid\\s+(\\S+)$"
    action: { type: shell, command: "{{input}}" }
    safety: read-only

  - id: supervisorctl-lifecycle
    match:
      type: regex
      patterns:
        - "^supervisorctl\\s+(start|stop|restart|update|signal\\s+\\S+)\\s+(\\S+)$"
    action: { type: shell, command: "{{input}}" }
    safety: write-confined

  # ── System V / OpenRC ──────────────────────────────────────────────
  - id: service-status
    match:
      type: regex
      patterns:
        - "^service\\s+(\\S+)\\s+status$"
    action: { type: shell, command: "{{input}}" }
    safety: read-only

  - id: rc-status
    match:
      type: exact
      patterns:
        - "rc-status"
        - "rc-status --list"
        - "rc-update"
        - "rc-update show"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  - id: chkconfig-list
    match:
      type: exact
      patterns:
        - "chkconfig --list"
        - "chkconfig"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  # ── systemd: a few more read-only introspection patterns ───────────
  - id: systemctl-status-one
    match:
      type: regex
      patterns:
        - "^systemctl\\s+(status|is-active|is-enabled|is-failed|cat|show)\\s+(\\S+)$"
        - "^systemctl\\s+--user\\s+(status|is-active|is-enabled|cat|show)\\s+(\\S+)$"
    action: { type: shell, command: "{{input}}" }
    safety: read-only

  - id: systemd-analyze
    match:
      type: exact
      patterns:
        - "systemd-analyze"
        - "systemd-analyze blame"
        - "systemd-analyze critical-chain"
        - "systemd-analyze time"
        - "systemd-analyze plot"
        - "systemd-analyze security"
    action: { type: shell, command: "{{input}}", args_passthrough: false }
    safety: read-only

  # ── launchctl service control (macOS) ──────────────────────────────
  - id: launchctl-list-one
    match:
      type: regex
      patterns:
        - "^launchctl\\s+list\\s+(\\S+)$"
        - "^launchctl\\s+print\\s+(gui|user|system)/\\d+/\\S+$"
    action: { type: shell, command: "{{input}}" }
    safety: read-only

  # ── journalctl range queries ───────────────────────────────────────
  - id: journalctl-scoped
    match:
      type: regex
      patterns:
        - "^journalctl\\s+-u\\s+(\\S+)(?:\\s+.*)?$"
        - "^journalctl\\s+--user-unit\\s+(\\S+)(?:\\s+.*)?$"
        - "^journalctl\\s+--since\\s+[\"']?([^\"']+)[\"']?(?:\\s+.*)?$"
    action: { type: shell, command: "{{input}}" }
    safety: read-only
